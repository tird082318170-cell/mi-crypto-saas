<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Crypto Whale Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] text-slate-200 font-sans min-h-screen">

    <div id="login" class="flex items-center justify-center min-h-screen">
        <div class="bg-slate-800/50 p-8 rounded-2xl backdrop-blur-md border border-slate-700 w-96 shadow-2xl">
            <div class="text-blue-500 text-4xl mb-4 flex justify-center"><i class="fas fa-chart-line"></i></div>
            <h2 class="text-2xl font-bold text-center mb-6 text-white">Whale Analytics</h2>
            <input id="user" type="text" placeholder="Admin User" class="w-full mb-3 p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-blue-500 outline-none">
            <input id="pass" type="password" placeholder="Password" class="w-full mb-6 p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-blue-500 outline-none">
            <button onclick="entrar()" class="bg-blue-600 hover:bg-blue-500 w-full py-3 rounded-xl font-bold transition-all transform hover:scale-105">Iniciar Terminal</button>
        </div>
    </div>

    <div id="dash" class="hidden p-6 max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-5">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tight">MARKET <span class="text-blue-500">INSIGHTS</span></h1>
                <p class="text-slate-500 text-sm">Monitoreo en tiempo real con señales de trading</p>
            </div>
            <button onclick="location.reload()" class="bg-slate-800 p-3 rounded-full hover:bg-slate-700 transition"><i class="fas fa-power-off text-red-400"></i></button>
        </header>

        <div id="market-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">
            </div>
    </div>

    <script>
        const API_URL = "https://mi-crypto-saas-1.onrender.com"; // CAMBIAR POR LA TUYA
        let token = "";

        async function entrar() {
            const res = await fetch(`${API_URL}/api/v1/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({usuario: document.getElementById('user').value, password: document.getElementById('pass').value})
            });
            if(res.ok) {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('dash').classList.remove('hidden');
                actualizar(); setInterval(actualizar, 30000);
            } else alert("Acceso denegado");
        }

        async function actualizar() {
            const res = await fetch(`${API_URL}/api/v1/mercado`);
            const data = await res.json();
            const grid = document.getElementById('market-grid');
            grid.innerHTML = "";

            data.forEach(coin => {
                const signal = coin.price_usd < coin.media_movil ? 
                    {text: 'COMPRA', color: 'text-green-400', bg: 'bg-green-400/10', icon: 'fa-arrow-trend-up'} : 
                    {text: 'VENTA', color: 'text-red-400', bg: 'bg-red-400/10', icon: 'fa-arrow-trend-down'};

                grid.innerHTML += `
                    <div class="bg-slate-800/40 border border-slate-700 p-6 rounded-2xl hover:border-blue-500/50 transition-all">
                        <div class="flex justify-between items-start mb-4">
                            <span class="uppercase font-black text-slate-400 tracking-widest">${coin.coin}</span>
                            <span class="${signal.bg} ${signal.color} text-[10px] px-3 py-1 rounded-full font-bold">
                                <i class="fas ${signal.icon} mr-1"></i> SUGERENCIA: ${signal.text}
                            </span>
                        </div>
                        <div class="text-4xl font-mono font-bold text-white mb-4">$${coin.price_usd.toLocaleString()}</div>
                        <div class="grid grid-cols-2 gap-4 text-xs">
                            <div class="bg-slate-900/50 p-3 rounded-lg">
                                <p class="text-slate-500 mb-1">Media (10m)</p>
                                <p class="text-blue-300 font-bold">$${coin.media_movil.toFixed(2)}</p>
                            </div>
                            <div class="bg-slate-900/50 p-3 rounded-lg">
                                <p class="text-slate-500 mb-1">24h Var</p>
                                <p class="${coin.var_porcentual >= 0 ? 'text-green-400' : 'text-red-400'} font-bold">
                                    ${coin.var_porcentual.toFixed(2)}%
                                </p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
