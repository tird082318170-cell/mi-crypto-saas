
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crypto Whale Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> </head>
<body class="bg-[#0b1120] text-white p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-black mb-8 text-blue-500 tracking-tighter">MARKET <span class="text-white">INSIGHTS PRO</span></h1>
        
        <div id="contenedor-monedas" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </div>

    <script>
        const API_URL = "https://mi-crypto-saas-1.onrender.com"; // Reemplaza con tu URL
        let charts = {}; // Guardar instancias de gráficas

        async function actualizarDashboard() {
            const res = await fetch(`${API_URL}/api/v1/mercado/completo`);
            const data = await res.json();
            const contenedor = document.getElementById('contenedor-monedas');

            for (const [coin, info] of Object.entries(data)) {
                let cardId = `card-${coin}`;
                let canvasId = `chart-${coin}`;

                // Si la tarjeta no existe, la creamos
                if (!document.getElementById(cardId)) {
                    contenedor.innerHTML += `
                        <div id="${cardId}" class="bg-slate-800/50 border border-slate-700 p-6 rounded-3xl shadow-2xl">
                            <h2 class="uppercase font-bold text-slate-400 mb-2">${coin}</h2>
                            <div class="text-3xl font-mono font-bold mb-4">$${info.actual.toLocaleString()}</div>
                            <canvas id="${canvasId}" class="w-full h-32"></canvas>
                        </div>
                    `;
                } else {
                    // Si ya existe, actualizamos solo el texto del precio
                    document.querySelector(`#${cardId} .text-3xl`).innerText = `$${info.actual.toLocaleString()}`;
                }

                // Dibujar o actualizar la gráfica
                dibujarGrafica(canvasId, info.historial);
            }
        }

        function dibujarGrafica(id, datos) {
            const ctx = document.getElementById(id).getContext('2d');
            
            // Si la gráfica ya existe, la destruimos para crear la nueva con datos frescos
            if (charts[id]) charts[id].destroy();

            charts[id] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: datos.map((_, i) => i),
                    datasets: [{
                        data: datos,
                        borderColor: '#3b82f6',
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false } }
                }
            });
        }

        actualizarDashboard();
        setInterval(actualizarDashboard, 60000);
    </script>
</body>
</html>
